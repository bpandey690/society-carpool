services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: carpool
      POSTGRES_PASSWORD: carpool
      POSTGRES_DB: carpool
    ports:
      - "5433:5432"
    volumes:
      - carpool_db:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d

  backend:
    build:
      context: .
    depends_on:
      - db
      - meilisearch
    env_file:
      - .env
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://carpool:carpool@db:5432/carpool?schema=public
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: masterKey
    ports:
      - "3000:3000"
    command: >
      sh -c "npx prisma db push --schema src/prisma/schema.prisma &&
             node dist/main.js"

  meilisearch:
    image: getmeili/meilisearch:v1.7
    environment:
      - MEILI_MASTER_KEY=masterKey
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

volumes:
  carpool_db:
  meili_data:
